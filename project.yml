name: GymTracker
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

targets:
  GymTracker:
    type: application
    platform: iOS
    sources:
      - GymTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.gymtracker
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: GymTracker
        INFOPLIST_KEY_UIRequiredDeviceCapabilities:
          - armv7
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  WidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - WidgetExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.gymtracker.widget
        GENERATE_INFOPLIST_FILE: YES

  LiveActivityExtension:
    type: app-extension
    platform: iOS
    sources:
      - LiveActivityExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.gymtracker.liveactivity
        GENERATE_INFOPLIST_FILE: YES
